<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CertManMon — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 28px;
      justify-content: center;
    }
    .login-logo svg { width: 24px; height: 24px; stroke: var(--primary); }
    .login-card h2 { font-size: 15px; color: var(--text-muted); font-weight: 400; text-align: center; margin-bottom: 24px; margin-top: -16px; }
    .login-error { color: var(--critical); font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 18px; }
    .login-card .form-group { margin-bottom: 14px; }
    .login-card .btn-primary { width: 100%; justify-content: center; padding: 10px; margin-top: 6px; font-size: 15px; }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-entra {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-entra:hover {
      background: var(--border);
      border-color: var(--primary);
    }
    .btn-entra svg { width: 18px; height: 18px; flex-shrink: 0; }
    #entraSection { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      CertManMon
    </div>
    <h2>Sign in to continue</h2>
    <div class="login-error" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" autocomplete="username" placeholder="username or email address" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrap">
          <input type="password" id="password" autocomplete="current-password" required />
          <button type="button" class="btn-show-password" id="loginPasswordToggle" title="Show/hide password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
    </form>

    <div id="entraSection">
      <div class="login-divider">or</div>
      <a href="/api/auth/entra/login" class="btn-entra" id="entraBtn">
        <!-- Microsoft logo SVG -->
        <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </a>
    </div>
  </div>
  <script>
    // Handle error query params
    const params = new URLSearchParams(window.location.search);
    const errorParam = params.get('error');
    if (errorParam) {
      const errorEl = document.getElementById('loginError');
      const messages = {
        invalid_state: 'Authentication state mismatch. Please try again.',
        entra_failed: 'Microsoft sign-in failed. Please try again.',
        account_disabled: 'Your account has been disabled. Contact an administrator.',
        entra_disabled: 'Microsoft sign-in is not enabled.',
        entra_not_configured: 'Microsoft sign-in is not configured yet.'
      };
      errorEl.textContent = messages[errorParam] || 'Authentication error. Please try again.';
    }

    // Check if Entra is enabled
    (async () => {
      try {
        const res = await fetch('/api/auth/providers');
        if (res.ok) {
          const data = await res.json();
          if (data.entra) {
            document.getElementById('entraSection').style.display = 'block';
          }
        }
      } catch (_) {}
    })();

    document.getElementById('loginPasswordToggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      document.querySelector('#loginPasswordToggle .icon-eye').style.display = showing ? '' : 'none';
      document.querySelector('#loginPasswordToggle .icon-eye-off').style.display = showing ? 'none' : '';
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Signing in\u2026';
      err.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          err.textContent = data.error || 'Login failed';
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        err.textContent = 'Could not reach server';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
